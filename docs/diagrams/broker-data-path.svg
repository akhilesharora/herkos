<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" role="img" aria-label="Broker data path: the agent's tool calls pass through herkos serve, which gates them deny-by-default and forwards allowed calls to the upstream MCP server; every brokered call is written to a signed, hash-chained, context-bound audit log that herkos verify checks offline."><rect x="0" y="0" width="920" height="300" rx="16" fill="#0d1320"/>
    <defs>
      <linearGradient id="dB" x1="0" y1="0" x2="920" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
      <marker id="dBa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6366f1"/></marker>
      <marker id="dBt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#2dd4bf"/></marker>
    </defs>
    <g><rect x="20" y="44" width="150" height="60" rx="11" fill="#1a2336" stroke="#394763"/>
      <text x="95" y="70" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#e7ecf3">agent</text>
      <text x="95" y="89" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7b8694">any MCP client</text></g>
    <g><rect x="330" y="28" width="210" height="92" rx="12" fill="#161e30" stroke="url(#dB)" stroke-width="1.5"/>
      <text x="435" y="58" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#e7ecf3">herkos serve</text>
      <text x="435" y="80" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11.5" fill="#aab4c2">deny-by-default tool gate</text>
      <text x="435" y="97" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11.5" fill="#aab4c2">+ content tripwire</text></g>
    <g><rect x="710" y="44" width="190" height="60" rx="11" fill="#1a2336" stroke="#394763"/>
      <text x="805" y="70" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#e7ecf3">upstream MCP server</text>
      <text x="805" y="89" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7b8694">possibly untrusted</text></g>
    <g><rect x="330" y="206" width="210" height="66" rx="11" fill="#1f2940" stroke="url(#dB)" stroke-width="1.5"/>
      <text x="435" y="234" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#2dd4bf">signed audit log</text>
      <text x="435" y="253" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#aab4c2">hash-chained, context-bound</text></g>
    <g><rect x="650" y="206" width="210" height="66" rx="11" fill="#1a2336" stroke="#394763"/>
      <text x="755" y="234" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#e7ecf3">herkos verify</text>
      <text x="755" y="253" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7b8694">offline, public key only</text></g>
    <line x1="170" y1="74" x2="324" y2="74" stroke="url(#dB)" stroke-width="2" marker-end="url(#dBa)"/>
    <text x="247" y="65" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7b8694">tools/call</text>
    <line x1="540" y1="74" x2="704" y2="74" stroke="url(#dB)" stroke-width="2" marker-end="url(#dBa)"/>
    <text x="625" y="65" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#2dd4bf">allowed: forwarded</text>
    <text x="625" y="94" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10.5" fill="#f87171">denied: blocked in-path</text>
    <line x1="435" y1="120" x2="435" y2="200" stroke="#2dd4bf" stroke-width="2" marker-end="url(#dBt)"/>
    <text x="500" y="166" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10.5" fill="#7b8694">every call</text>
    <line x1="540" y1="239" x2="644" y2="239" stroke="url(#dB)" stroke-width="2" marker-end="url(#dBa)"/>
  </svg>