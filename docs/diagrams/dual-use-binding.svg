<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" role="img" aria-label="SpanGate: a query goes to the local code graph, which emits one minimal span set; that single set becomes both the model context and the egress allowlist, and every answer ships a signed receipt."><rect x="0" y="0" width="920" height="280" rx="16" fill="#0d1320"/>
    <defs>
      <linearGradient id="dA" x1="0" y1="0" x2="920" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
      <marker id="dAa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6366f1"/></marker>
      <marker id="dAt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#2dd4bf"/></marker>
    </defs>
    <g><rect x="14" y="112" width="150" height="56" rx="11" fill="#1a2336" stroke="#394763"/>
      <text x="89" y="138" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#e7ecf3">query</text>
      <text x="89" y="156" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7b8694">from the agent</text></g>
    <g><rect x="232" y="96" width="190" height="88" rx="12" fill="#161e30" stroke="url(#dA)" stroke-width="1.5"/>
      <text x="327" y="128" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#e7ecf3">local code graph</text>
      <text x="327" y="150" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11.5" fill="#aab4c2">emits minimal</text>
      <text x="327" y="166" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11.5" fill="#2dd4bf">(file, line-range) spans</text></g>
    <g><rect x="490" y="110" width="120" height="60" rx="11" fill="#1f2940" stroke="url(#dA)" stroke-width="1.5"/>
      <text x="550" y="135" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#e7ecf3">one span</text>
      <text x="550" y="153" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#e7ecf3">set</text></g>
    <g><rect x="700" y="40" width="206" height="68" rx="11" fill="#1a2336" stroke="#394763"/>
      <text x="803" y="68" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13.5" fill="#2dd4bf">model context</text>
      <text x="803" y="88" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7b8694">the spans it needs</text></g>
    <g><rect x="700" y="172" width="206" height="68" rx="11" fill="#1a2336" stroke="#394763"/>
      <text x="803" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13.5" fill="#6366f1">egress allowlist</text>
      <text x="803" y="220" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7b8694">deny-by-default</text></g>
    <line x1="164" y1="140" x2="226" y2="140" stroke="#394763" stroke-width="2" marker-end="url(#dAa)"/>
    <line x1="422" y1="140" x2="484" y2="140" stroke="url(#dA)" stroke-width="2" marker-end="url(#dAa)"/>
    <path d="M610 134 C 660 120, 660 80, 696 74" stroke="#2dd4bf" stroke-width="2" fill="none" marker-end="url(#dAt)"/>
    <path d="M610 146 C 660 160, 660 200, 696 206" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#dAa)"/>
    <text x="650" y="150" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10.5" fill="#7b8694">same set</text>
  </svg>